services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ozen-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  panako:
    image: innlabkz/ozen-panako:latest
    container_name: ozen-panako
    ports:
      - "8344:8080"
    environment:
      - JAVA_OPTS=-Xmx2g
      - STRATEGY=OLAF
      - OLAF_STORAGE=LMDB
      - OLAF_CACHE_TO_FILE=FALSE
      - OLAF_USE_CACHED_PRINTS=FALSE
#      - PANAKO_STORAGE=LMDB
#      - PANAKO_CLICKHOUSE_URL=jdbc:ch://clickhouse:8123/default?user=${CLICKHOUSE_USER:-default}&password=${CLICKHOUSE_PASSWORD:-}
      - PANAKO_CACHE_TO_FILE=FALSE
      - PANAKO_USE_CACHED_PRINTS=FALSE
      - MONITOR_STEP_SIZE=10
      - MONITOR_OVERLAP=5
      - SERVER_PORT=8080
      - KAFKA_ENABLED=TRUE
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    volumes:
      - ./data/panako-db:/root/.panako/dbs
    depends_on:
      clickhouse:
        condition: service_healthy
